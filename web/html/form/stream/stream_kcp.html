{{define "form/streamKCP"}}
<a-form
  :colon="false"
  :label-col="{ md: {span:8} }"
  :wrapper-col="{ md: {span:14} }"
>
  <a-form-item label="MTU">
    <a-input-number
      v-model.number="inbound.stream.kcp.mtu"
      :min="576"
      :max="1460"
    ></a-input-number>
  </a-form-item>
  <a-form-item label="TTI (ms)">
    <a-input-number
      v-model.number="inbound.stream.kcp.tti"
      :min="10"
      :max="100"
    ></a-input-number>
  </a-form-item>
  <a-form-item label="Uplink (MB/s)">
    <a-input-number
      v-model.number="inbound.stream.kcp.upCap"
      :min="0"
    ></a-input-number>
  </a-form-item>
  <a-form-item label="Downlink (MB/s)">
    <a-input-number
      v-model.number="inbound.stream.kcp.downCap"
      :min="0"
    ></a-input-number>
  </a-form-item>
  <a-form-item label="CWND Multiplier">
    <a-input-number
      v-model.number="inbound.stream.kcp.cwndMultiplier"
      :min="0"
    ></a-input-number>
  </a-form-item>
  <a-form-item label="Max Sending Window">
    <a-input-number
      v-model.number="inbound.stream.kcp.maxSendingWindow"
      :min="0"
    ></a-input-number>
  </a-form-item>
</a-form>
{{end}}
