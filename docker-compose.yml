services:
  dune:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: dune_app
    # hostname: yourhostname <- optional
    # The bundled Fail2ban (DUNE_ENABLE_FAIL2BAN below) enforces the IP limit
    # with iptables, which needs NET_ADMIN. Without these caps a ban is logged
    # and shown in fail2ban status but never actually applied. NET_RAW covers
    # ip6tables. If you disable Fail2ban, you can drop cap_add.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - $PWD/db/:/etc/dune/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      DUNE_ENABLE_FAIL2BAN: "true"
      # DUNE_INIT_WEB_BASE_PATH: "/"
      # DUNE_PORT: "8080"
      # To use PostgreSQL instead of the default SQLite, run:
      #   docker compose --profile postgres up -d
      # and uncomment the two lines below.
      # DUNE_DB_TYPE: "postgres"
      # DUNE_DB_DSN: "postgres://dune:dune@postgres:5432/dune?sslmode=disable"
    tty: true
    ports:
      # When DUNE_PORT is set, publish the same container port (for example "8080:8080").
      - "2053:2053"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dune_postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: dune
      POSTGRES_DB: dune
    volumes:
      - $PWD/pgdata/:/var/lib/postgresql/data
    restart: unless-stopped
