name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.ts'
      - '**/*.vue'
      - '**/*.html'
      - '**/*.css'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.nvmrc'
      - 'web/**'
      - 'Dockerfile'
      - 'DockerInit.sh'
      - 'DockerEntrypoint.sh'
      - 'x-ui.sh'
      - '.dockerignore'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-scope:
    name: Detect Build Scope
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.scope.outputs.docker }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Docker-related changes
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          docker=false

          echo "Comparing changes from $base_sha to $head_sha"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "changed: $file"
            case "$file" in
              Dockerfile|DockerInit.sh|DockerEntrypoint.sh|.dockerignore|x-ui.sh|go.mod|go.sum|.github/workflows/ci.yml)
                docker=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base_sha" "$head_sha")

          echo "docker=$docker" >> "$GITHUB_OUTPUT"

  go-check:
    name: Go Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Check gofmt
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if [ "${#go_files[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted=$(gofmt -l "${go_files[@]}")
          if [ -n "$unformatted" ]; then
            echo "The following Go files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...

  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

      - name: Build frontend bundle
        run: npm run build
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs:
      - detect-scope
      - go-check
      - frontend-check
    if: needs.detect-scope.outputs.docker == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
