name: Release 3X-UI for Docker

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: "3x-ui"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            reg.vados.ru/${{ env.IMAGE_NAME }}
#            ghcr.io/vados-dev/${{ env.IMAGE_NAME }}
          flavor: |
             latest=auto
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registries
        uses: docker/login-action@v4
        with:
          registry-auth: |
            - username: ${{ vars.DOCKER_HUB_USERNAME }}
              password: ${{ secrets.DOCKER_HUB_TOKEN }}
            - registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
              
      - name: Login to reg.vados.ru
        uses: docker/login-action@v4
        with:
          registry: |
            - registry-auth: reg.vados.ru
              username: ${{ vars.VADOS_REG_USERNAME }}
              password: ${{ secrets.VADOS_REG_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
#          ${{ steps.meta.outputs.images }}:${{ steps.meta.outputs.tags }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
