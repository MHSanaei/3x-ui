name: Release 3X-UI for Docker

permissions:
  contents: read
  packages: write

env:
  CI_IMAGE_NAME: "3x-ui"
  CI_RETGISTRY: "reg.vados.ru"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        env:
           registry: ${{ env.CI_RETGISTRY }}
           image: ${{ env.CI_IMAGE_NAME }}
        with:
          images: |
            $registry/$image
#            ghcr.io/vados-dev/${{ env.IMAGE_NAME }}
          flavor: |
             latest=auto
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        shell: bash
        run: |
          set -euo pipefail
          echo ${{ secrets.REG_PASS }} | docker login ${{ env.CI_RETGISTRY }} -u {{ vars.REG_USER }} --password-stdin
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          images: ${{ steps.meta.outputs.images }}:${{ steps.meta.outputs.tags }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

#        uses: docker/login-action@v2
