name: Build Cloud Images

# Build golden cloud images from a published release:
#   * qemu      -> qcow2 attached to the GitHub release (always)
#   * amazon-ebs -> AWS AMI (only when AWS credentials are configured)
#
# Images contain NO database and NO baked credentials; first boot generates
# unique per-instance credentials (see deploy/firstboot + deploy/packer).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build images for (e.g. v3.3.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: image-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  XUI_ARCH: amd64
  ASSET_NAME: x-ui-linux-amd64.tar.gz

jobs:
  # Resolve the tag and wait until the amd64 release tarball is actually
  # published (the release matrix uploads assets one by one, so 'published'
  # can fire before x-ui-linux-amd64.tar.gz exists).
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          [ -n "$TAG" ] || { echo "::error::no tag resolved"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for released binary asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --json assets -q '.assets[].name' | grep -qx "$ASSET_NAME"; then
              echo "Found $ASSET_NAME on release $TAG"
              exit 0
            fi
            echo "Waiting for $ASSET_NAME on $TAG ($i/30)..."
            sleep 20
          done
          echo "::error::$ASSET_NAME not found on release $TAG after 10 minutes"
          exit 1

  # Decide whether the AWS AMI build can run, so forks without secrets skip it
  # cleanly (secrets cannot be referenced directly in job-level `if`).
  check-aws:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.c.outputs.enabled }}
      use_oidc: ${{ steps.c.outputs.use_oidc }}
    steps:
      - id: c
        env:
          ROLE: ${{ secrets.AWS_ROLE_ARN }}
          KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "$ROLE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_oidc=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_oidc=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "use_oidc=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No AWS credentials configured; skipping the AMI build."
          fi

  qemu-image:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Verify released binary asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.setup.outputs.tag }}
        run: |
          mkdir -p _asset
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET_NAME" --dir _asset
          ls -la _asset

      - name: Select accelerator
        id: accel
        run: |
          if [ -e /dev/kvm ]; then echo "value=kvm" >> "$GITHUB_OUTPUT"; else echo "value=tcg" >> "$GITHUB_OUTPUT"; fi

      - name: Packer init
        run: packer init deploy/packer/

      - name: Build qcow2 image
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          ACCEL: ${{ steps.accel.outputs.value }}
        run: |
          packer build -only='qemu.x-ui' \
            -var "xui_version=${TAG}" \
            -var "xui_arch=${XUI_ARCH}" \
            -var "qemu_accelerator=${ACCEL}" \
            deploy/packer/

      - name: Compress qcow2
        id: pack
        env:
          TAG: ${{ needs.setup.outputs.tag }}
        run: |
          cd deploy/packer/output-qemu
          src="3x-ui-ubuntu-24.04.qcow2"
          out="3x-ui-ubuntu-24.04-${TAG}-amd64.qcow2.xz"
          xz -T0 -6 -c "$src" > "$out"
          sha256sum "$out" > "${out}.sha256"
          echo "file=deploy/packer/output-qemu/${out}" >> "$GITHUB_OUTPUT"
          echo "sha=deploy/packer/output-qemu/${out}.sha256" >> "$GITHUB_OUTPUT"
          ls -la

      - name: Attach qcow2 to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.setup.outputs.tag }}
        run: |
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            "${{ steps.pack.outputs.file }}" "${{ steps.pack.outputs.sha }}"

      - name: Summary
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          ACCEL: ${{ steps.accel.outputs.value }}
        run: |
          {
            echo "## QEMU image"
            echo "- Tag: \`${TAG}\`"
            echo "- Accelerator: \`${ACCEL}\`"
            echo "- Attached: \`$(basename "${{ steps.pack.outputs.file }}")\`"
          } >> "$GITHUB_STEP_SUMMARY"

  ami-image:
    needs: [setup, check-aws]
    if: needs.check-aws.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Configure AWS credentials (OIDC)
        if: needs.check-aws.outputs.use_oidc == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS credentials (access keys)
        if: needs.check-aws.outputs.use_oidc != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Verify released binary asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.setup.outputs.tag }}
        run: |
          mkdir -p _asset
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET_NAME" --dir _asset
          ls -la _asset

      - name: Packer init
        run: packer init deploy/packer/

      - name: Build AMI
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          packer build -only='amazon-ebs.x-ui' \
            -var "xui_version=${TAG}" \
            -var "xui_arch=${XUI_ARCH}" \
            -var "region=${REGION}" \
            deploy/packer/

      - name: Publish AMI id to summary
        env:
          REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          AMI_ID=$(jq -r '.builds[] | select(.builder_type=="amazon-ebs") | .artifact_id' packer-manifest.json | tail -1 | cut -d: -f2)
          {
            echo "## AWS AMI"
            echo "- Region: \`${REGION}\`"
            echo "- AMI ID: \`${AMI_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
