name: Release 3X-UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Ensure tag exists
        run: git rev-parse "refs/tags/${{ inputs.tag }}"

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          prev_tag="$(git describe --tags --abbrev=0 "refs/tags/${RELEASE_TAG}^" 2>/dev/null || true)"
          {
            echo "## Release ${RELEASE_TAG}"
            echo
            echo "Manual source release for tag \`${RELEASE_TAG}\`."
            echo
            if [ -n "$prev_tag" ]; then
              echo "Changes since \`${prev_tag}\`:"
              echo
              git log "${prev_tag}..refs/tags/${RELEASE_TAG}" --pretty=format:"- %s (%h)"
            else
              echo "Initial tagged release in this repository."
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
