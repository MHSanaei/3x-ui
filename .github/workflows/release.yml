name: Release 3X-UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release, for example v3.3.0."
        required: true
        type: string
      target_sha:
        description: "Commit SHA the tag points to."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create source release
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag }}
      TARGET_SHA: ${{ inputs.target_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Fetch tags
        shell: bash
        run: git fetch --force --tags origin

      - name: Generate release notes
        shell: bash
        run: |
          prev_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          {
            echo "## Release ${TAG_NAME}"
            echo
            echo "Automated source release for tag \`${TAG_NAME}\`."
            echo
            if [ -n "$prev_tag" ]; then
              echo "Changes since \`${prev_tag}\`:"
              echo
              git log "${prev_tag}..${TARGET_SHA}" --pretty=format:"- %s (%h)"
            else
              echo "Initial tagged release in this repository."
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ env.TARGET_SHA }}
          name: ${{ env.TAG_NAME }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
